<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progetti 3D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: #15151d; color: #fff;
      display: flex; align-items: center; padding: 0 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      z-index: 100;
    }
    .brand {
      font-size: 14px; font-weight: 600; opacity: 0.85;
      margin-right: 22px; letter-spacing: 0.02em;
    }
    .tabs { display: flex; gap: 2px; }
    .tab {
      background: transparent; border: 0; color: rgba(255,255,255,0.55);
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font: inherit; font-size: 13.5px; font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .tab.active { background: rgba(255,255,255,0.10); color: #fff; }

    .frame-wrap {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      background: #f6f4ee;
    }
    .project-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0; display: none; background: #f6f4ee;
    }
    .project-frame.active { display: block; }

    @media (max-width: 600px) {
      .nav { padding: 0 12px; }
      .brand { display: none; }
      .tab { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">Progetti 3D</div>
    <div class="tabs">
      <button class="tab active" data-key="apt">Appartamento</button>
      <button class="tab" data-key="med">Studio medico</button>
    </div>
  </nav>

  <div class="frame-wrap">
    <!-- Il primo iframe carica subito; il secondo è "lazy" e parte al primo click sul tab -->
    <iframe id="frame-apt" class="project-frame active" src="appartamento.html" title="Appartamento residenziale"></iframe>
    <iframe id="frame-med" class="project-frame" data-src="studio-medico.html" title="Studio medico"></iframe>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const frames = {
      apt: document.getElementById('frame-apt'),
      med: document.getElementById('frame-med')
    };

    function activate(key) {
      // Lazy-load del progetto la prima volta che viene aperto
      if (!frames[key].src && frames[key].dataset.src) {
        frames[key].src = frames[key].dataset.src;
      }
      // Stato dei tab
      tabs.forEach(t => t.classList.toggle('active', t.dataset.key === key));
      // Visibilità degli iframe (rimangono caricati in background → switch istantaneo dopo il primo accesso)
      Object.entries(frames).forEach(([k, f]) => f.classList.toggle('active', k === key));
      // Aggiorna l'hash dell'URL così il link è condivisibile (es. ...github.io/#med)
      if (history.replaceState) {
        history.replaceState(null, '', '#' + key);
      }
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => activate(tab.dataset.key));
    });

    // All'apertura, se l'URL ha già un hash valido apri quel progetto
    const initialKey = window.location.hash.slice(1);
    if (initialKey === 'med' || initialKey === 'apt') {
      activate(initialKey);
    }
  </script>
</body>
</html>
